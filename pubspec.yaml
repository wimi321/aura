name: aura_app
description: "Aura: Local AI Roleplay Studio"
publish_to: 'none'
version: 0.2.3+5
homepage: https://github.com/wimi321/aura
repository: https://github.com/wimi321/aura

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  go_router: ^13.2.0
  provider: ^6.1.1
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  file_selector: ^1.0.3
  aura_core:
    path: packages/aura_core
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  image: ^4.5.4

dependency_overrides:
  objective_c:
    path: third_party/objective_c

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/images/characters/
    - assets/images/ui/
